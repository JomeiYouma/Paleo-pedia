<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- ── Primary meta ─────────────────────────────────────── -->
    <title>Paléo-Énergétique — Une contre-histoire de l'énergie</title>
    <meta
      name="description"
      content="Paléo-Énergétique est un programme de recherche participatif lancé par Atelier 21 en 2015 : nous exhumons et partageons les inventions oubliées dans le domaine des énergies alternatives."
    />
    <meta name="author" content="Atelier 21" />

    <!-- ── Open Graph (Facebook, LinkedIn, Discord…) ────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Paléo-Énergétique" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:title" content="Paléo-Énergétique — Une contre-histoire de l'énergie" />
    <meta
      property="og:description"
      content="Programme de recherche participatif sur les inventions oubliées de l'énergie. Frise chronologique, Rétrofutur Museum, et appel à contributions."
    />
    <meta property="og:url" content="https://paleo-energetique.org/" />
    <meta property="og:image" content="https://paleo-energetique.org/photos/museum-banner.png" />
    <meta property="og:image:alt" content="Vue intérieure du Rétrofutur Museum, premier musée des énergies alternatives à Paris" />

    <!-- ── Twitter Card ─────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Paléo-Énergétique — Une contre-histoire de l'énergie" />
    <meta
      name="twitter:description"
      content="Programme de recherche participatif sur les inventions oubliées de l'énergie."
    />
    <meta name="twitter:image" content="https://paleo-energetique.org/photos/museum-banner.png" />

    <!-- ── Canonical (mis à jour côté JS pour les sous-pages) ─ -->
    <link rel="canonical" href="https://paleo-energetique.org/" />

    <!-- ── Structured data (schema.org) ─────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Paléo-Énergétique",
        "alternateName": "Paleo-Énergétique",
        "url": "https://paleo-energetique.org/",
        "logo": "https://paleo-energetique.org/favicon.png",
        "email": "hello@paleo-energetique.org",
        "foundingDate": "2015",
        "founder": {
          "@type": "Organization",
          "name": "Atelier 21",
          "url": "https://atelier21.org/"
        },
        "description": "Programme de recherche participatif et citoyen sur les inventions oubliées dans le domaine des énergies alternatives. Frise chronologique en ligne et Rétrofutur Museum à Paris.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "5 allée Paris-Ivry",
          "addressLocality": "Paris",
          "postalCode": "75013",
          "addressCountry": "FR"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Paléo-Énergétique",
        "url": "https://paleo-energetique.org/",
        "inLanguage": ["fr", "en"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Compat ancien hash router : on est passé de createHashRouter à
         createBrowserRouter. Les anciens liens externes / bookmarks /
         impressions en `/#/presentation` sont réécrits ici, AVANT que le
         bundle React monte le router. Petit script inline (pas de défer)
         pour que le router voie tout de suite l'URL propre. -->
    <script>
      (function () {
        var h = window.location.hash;
        if (h && h.indexOf('#/') === 0) {
          window.history.replaceState(null, '', h.slice(1) + window.location.search);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
